<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#e74c3c" />

  <!-- ✅ App name -->
  <title>BloodConnect — Save Lives Together</title>

  <!-- ✅ SEO meta tags -->
  <meta name="description"
    content="BloodConnect — A platform connecting blood donors with those in need. Find nearby donors, request blood, and save lives." />
  <meta name="keywords" content="blood donation, blood donor, blood connect, donate blood, blood bank" />
  <meta name="author" content="BloodConnect" />

  <!-- ✅ Open Graph (shows when shared on WhatsApp, Twitter etc) -->
  <meta property="og:title" content="BloodConnect — Save Lives Together" />
  <meta property="og:description" content="Connect with blood donors near you. Fast, free, and life-saving." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

  <!-- ✅ Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="BloodConnect" />
  <meta name="twitter:description" content="Find blood donors near you instantly." />

  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- ✅ Preload font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    /* Prevent white flash on load */
    body {
      background: #0d0d12;
      margin: 0;
    }

    /* Loading screen shown before React mounts */
    #root:empty::before {
      content: '';
      position: fixed;
      inset: 0;
      background: #0d0d12;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run BloodConnect.</noscript>
  <div id="root"></div>
</body>

</html>
